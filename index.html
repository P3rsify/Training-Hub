    (function(){
      var mem={};
      try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('tkdhub__'))mem[k.slice(8)]=localStorage.getItem(k);}}catch(e){}
      window.storage={
        get:function(key){return Promise.resolve(mem[key]!==undefined?{key:key,value:mem[key]}:null);},
        set:function(key,value){mem[key]=value;try{localStorage.setItem('tkdhub__'+key,value);}catch(e){}return Promise.resolve({key:key,value:value});},
        delete:function(key){delete mem[key];try{localStorage.removeItem('tkdhub__'+key);}catch(e){}return Promise.resolve({key:key,deleted:true});},
        list:function(prefix){return Promise.resolve({keys:Object.keys(mem).filter(function(k){return!prefix||k.startsWith(prefix);})}); }
      };
    })();

// ─── AUDIO ────────────────────────────────────────────────────────────────────
function playBeep(freq = 880, duration = 0.12, vol = 0.4, type = "sine") {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
    osc.onended = () => ctx.close();
  } catch(e) {}
}

function timerBeep(secs) {
  if (secs === 10) {
    // Single warning beep at 10s
    playBeep(660, 0.15, 0.35);
  } else if (secs === 3 || secs === 2) {
    // Short beep for 3 and 2
    playBeep(880, 0.1, 0.4);
  } else if (secs === 1) {
    // Slightly higher for 1
    playBeep(1000, 0.1, 0.4);
  } else if (secs === 0) {
    // Double high tone on completion
    playBeep(1320, 0.18, 0.5);
    setTimeout(() => playBeep(1320, 0.25, 0.5), 200);
  }
}

function useRestTimer() {
  const [secs, setSecs] = useState(0);
  const [running, setRunning] = useState(false);
  const [initial, setInitial] = useState(0);
  const ref = useRef(null);
  const start = useCallback((s) => {
    clearInterval(ref.current);
    setInitial(s); setSecs(s); setRunning(true);
    ref.current = setInterval(() => setSecs(p => {
      const next = p <= 1 ? 0 : p - 1;
      timerBeep(next);
      if (next === 0) { clearInterval(ref.current); setRunning(false); }
      return next;
    }), 1000);
  }, []);
  const stop = useCallback(() => { clearInterval(ref.current); setRunning(false); setSecs(0); }, []);
  useEffect(() => () => clearInterval(ref.current), []);
  return { secs, running, progress: initial > 0 ? (initial - secs) / initial : 0, start, stop };
}

function useHoldTimer() {
  const [secs, setSecs] = useState(0);
  const [running, setRunning] = useState(false);
  const [initial, setInitial] = useState(0);
  const [done, setDone] = useState(false);
  const ref = useRef(null);
  const start = useCallback((s) => {
    clearInterval(ref.current);
    setInitial(s); setSecs(s); setRunning(true); setDone(false);
    ref.current = setInterval(() => setSecs(p => {
      const next = p <= 1 ? 0 : p - 1;
      timerBeep(next);
      if (next === 0) { clearInterval(ref.current); setRunning(false); setDone(true); }
      return next;
    }), 1000);
  }, []);
  const pause = useCallback(() => { clearInterval(ref.current); setRunning(false); }, []);
  const resume = useCallback((s) => {
    const rem = s !== undefined ? s : secs;
    if (rem > 0) {
      setSecs(rem); setRunning(true);
      ref.current = setInterval(() => setSecs(p => {
        const next = p <= 1 ? 0 : p - 1;
        timerBeep(next);
        if (next === 0) { clearInterval(ref.current); setRunning(false); setDone(true); }
        return next;
      }), 1000);
    }
  }, [secs]);
  const reset = useCallback((s) => { clearInterval(ref.current); setRunning(false); setDone(false); setSecs(s || initial); }, [initial]);
  useEffect(() => () => clearInterval(ref.current), []);
  return { secs, running, done, progress: initial > 0 ? 1 - secs / initial : 0, start, pause, resume, reset, initial };
}

function RingTimer({ timer, hold, color }) {
  const size = 140, r = 58, circ = 2 * Math.PI * r;
  const displaySecs = (!timer.running && !timer.done) ? hold : timer.secs;
  const m = Math.floor(displaySecs / 60), s = displaySecs % 60;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
      <div style={{ position: "relative", width: size, height: size }}>
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={D.border} strokeWidth={5} />
          <circle cx={size/2} cy={size/2} r={r} fill="none"
            stroke={timer.done ? D.teal : color} strokeWidth={5}
            strokeDasharray={circ} strokeDashoffset={circ * (1 - timer.progress)}
            strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
            style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          {timer.done
            ? <span style={{ fontSize: 30 }}>✓</span>
            : <>
                <span style={{ fontSize: 28, fontWeight: 700, fontFamily: D.mono, color: D.text, lineHeight: 1 }}>
                  {m > 0 ? `${m}:${String(s).padStart(2,"0")}` : displaySecs}
                </span>
                <Label style={{ marginTop: 4, color: timer.running ? color : D.muted }}>
                  {timer.running ? "hold" : "ready"}
                </Label>
              </>
          }
        </div>
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        {!timer.running && !timer.done && timer.secs === 0 && (
          <button onClick={() => timer.start(hold)} style={pill(color, "#fff")}>Start</button>
        )}
        {timer.running && (
          <button onClick={timer.pause} style={pill(D.surface2, D.text)}>Pause</button>
        )}
        {!timer.running && !timer.done && timer.secs > 0 && (
          <>
            <button onClick={() => timer.resume()} style={pill(color, "#fff")}>Resume</button>

        {timer.done && (
          <button onClick={() => timer.reset(hold)} style={pill(D.faint, D.muted)}>Again</button>
        )}

    </div>
  );
}

// ─── STRENGTH WORKOUT VIEW ────────────────────────────────────────────────────
function StrengthWorkout({ phaseIdx, dayIdx, onBack, onComplete }) {
  const ph = strengthPlan.phases[phaseIdx];
  const day = ph.days[dayIdx];
  const color = ph.color;
  const rest = useRestTimer();
  const [logs, setLogs] = useState({});
  const [prevLogs, setPrevLogs] = useState({});
  const [finished, setFinished] = useState(false);
  const [loaded, setLoaded] = useState(false);

  // Restore current session logs and previous session logs on mount
  useEffect(() => {
    const restore = async () => {
      const restored = {};
      const prev = {};
      for (let ei = 0; ei < day.exercises.length; ei++) {
        for (let si = 0; si < day.exercises[ei].sets; si++) {
          const key = SK.strengthSet(phaseIdx, dayIdx, ei, si);
          const prevKey = SK.strengthPrev(phaseIdx, dayIdx, ei, si);
          try {
            const r = await window.storage.get(key, false);
            if (r?.value) {
              try { restored[key] = JSON.parse(r.value); }
              catch { restored[key] = { reps: Number(r.value), weight: null }; }
            }
          } catch {}
          try {
            const p = await window.storage.get(prevKey, false);
            if (p?.value) {
              try { prev[prevKey] = JSON.parse(p.value); }
              catch { prev[prevKey] = { reps: Number(p.value), weight: null }; }
            }
          } catch {}
        }
      }
      setLogs(restored);
      setPrevLogs(prev);
      setLoaded(true);
    };
    restore();
  }, [phaseIdx, dayIdx]);

  const totalSets = day.exercises.reduce((a, e) => a + e.sets, 0);
  const doneSets = Object.values(logs).filter(v => v && v.reps != null).length;
  const pct = totalSets > 0 ? (doneSets / totalSets) * 100 : 0;

  const handleSave = (ei, si, data) => {
    const key = SK.strengthSet(phaseIdx, dayIdx, ei, si);
    setLogs(prev => ({ ...prev, [key]: data }));
    try { window.storage.set(key, JSON.stringify(data), false); } catch {}
    const ex = day.exercises[ei];
    rest.start(ex.restType === "heavy" ? 150 : ex.rest || 90);
  };

  const handleFinish = async () => {
    // Save current logs as previous session before clearing
    for (let ei = 0; ei < day.exercises.length; ei++) {
      for (let si = 0; si < day.exercises[ei].sets; si++) {
        const key = SK.strengthSet(phaseIdx, dayIdx, ei, si);
        const prevKey = SK.strengthPrev(phaseIdx, dayIdx, ei, si);
        const val = logs[key];
        if (val) {
          try { await window.storage.set(prevKey, JSON.stringify(val), false); } catch {}
        }
      }
    }
    const prev = await loadKey(SK.strengthHist) || [];
    const entry = {
      type: "strength", date: new Date().toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "2-digit" }),
      label: `${day.day} — ${day.type}`, sub: ph.label, sets: doneSets, total: totalSets, color,
    };
    await saveKey(SK.strengthHist, [entry, ...prev].slice(0, 40));
    // Clear saved set logs for this workout now it's completed
    for (let ei = 0; ei < day.exercises.length; ei++) {
      for (let si = 0; si < day.exercises[ei].sets; si++) {
        try { await window.storage.delete(SK.strengthSet(phaseIdx, dayIdx, ei, si), false); } catch {}
      }
    }
    setFinished(true);
    onComplete();
  };

  if (finished) return (
    <div style={{ textAlign: "center", padding: "60px 20px" }}>
      <div style={{ fontSize: 56, marginBottom: 16 }}>💪</div>
      <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Workout Done!</div>
      <div style={{ color: D.muted, marginBottom: 28 }}>{doneSets}/{totalSets} sets logged</div>
      <button onClick={onBack} style={pill(color, "#fff")}>← Back to Plan</button>
    </div>
  );

  if (!loaded) return (
    <div style={{ textAlign: "center", padding: "60px 20px", color: D.muted }}>
      <Mono style={{ fontSize: 12 }}>Loading...</Mono>
    </div>
  );

  return (
    <div>
      <div style={{ marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 7 }}>
          <Label>Progress</Label>
          <Mono style={{ fontSize: 11, color }}>{doneSets}/{totalSets} sets</Mono>
        </div>
        <div style={{ height: 4, background: D.border, borderRadius: 2 }}>
          <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: 2, transition: "width 0.4s" }} />
        </div>
      </div>

      {day.exercises.map((ex, ei) => (
        <FlipCard key={ei} ex={ex} color={color} ei={ei} phaseIdx={phaseIdx} dayIdx={dayIdx}
          logs={logs} prevLogs={prevLogs} onSave={(si, r) => handleSave(ei, si, r)} />
      ))}

      {/* Complete button — always visible, shows progress if not all sets done */}
      <div style={{ marginTop: 8, marginBottom: 80 }}>
        {doneSets < totalSets && (
          <div style={{ textAlign: "center", marginBottom: 10 }}>
            <Mono style={{ fontSize: 10, color: D.muted }}>{totalSets - doneSets} sets remaining — you can still complete the workout</Mono>
          </div>
        )}
        <button onClick={handleFinish} style={{
          width: "100%", border: "none", borderRadius: 10, padding: "15px",
          fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: D.font,
          background: doneSets === totalSets ? color : D.surface2,
          color: doneSets === totalSets ? "#fff" : D.muted,
          borderTop: `2px solid ${doneSets === totalSets ? color : D.border}`,
        }}>
          {doneSets === totalSets ? "✓ Complete Workout" : `Complete Workout (${doneSets}/${totalSets} sets)`}
        </button>
      </div>

      <RestOverlay secs={rest.secs} running={rest.running} progress={rest.progress} color={color} onSkip={rest.stop} />
    </div>
  );
}

function SetBox({ label, target, color, saved, lastSaved, onSave }) {
  const [reps, setReps] = useState(saved?.reps != null ? String(saved.reps) : "");
  const [weight, setWeight] = useState(saved?.weight != null ? String(saved.weight) : "");
  const done = reps !== "";
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);
  const [swiped, setSwiped] = useState(false);

  const commit = (newReps, newWeight) => {
    if (newReps !== "") onSave({ reps: Number(newReps), weight: newWeight !== "" ? Number(newWeight) : null });
  };

  const handleTouchStart = (e) => {
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
  };

  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY.current);
    // Swipe right: at least 50px horizontal, less than 40px vertical drift
    if (dx > 50 && dy < 40 && !done) {
      const fillReps = lastSaved?.reps != null ? String(lastSaved.reps) : "";
      const fillWeight = lastSaved?.weight != null ? String(lastSaved.weight) : "";
      if (fillReps !== "") {
        setReps(fillReps);
        setWeight(fillWeight);
        setSwiped(true);
        onSave({ reps: Number(fillReps), weight: fillWeight !== "" ? Number(fillWeight) : null });
      }
    }
    touchStartX.current = null;
    touchStartY.current = null;
  };

  return (
    <div
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
      style={{
        background: done ? "#1e1a0a" : D.surface2,
        border: `1px solid ${done ? color + "55" : D.border}`,
        borderRadius: 8, padding: "8px 10px", minWidth: 90,
        transition: "background 0.2s, border-color 0.2s",
        position: "relative", overflow: "hidden",
      }}>
      {/* Swipe hint — only shown if lastSaved exists and not yet done */}
      {!done && lastSaved?.reps != null && (
        <div style={{ position: "absolute", top: 3, right: 4 }}>
          <Mono style={{ fontSize: 6, color: D.muted, letterSpacing: 0.5 }}>swipe →</Mono>
        </div>
      )}
      <Mono style={{ fontSize: 8, color: done ? color : D.muted, display: "block", marginBottom: 6, letterSpacing: 1 }}>{label}</Mono>
      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
          <Mono style={{ fontSize: 7, color: D.muted, letterSpacing: 1 }}>KG</Mono>
          <input type="number" min={0} max={999} step={0.5} value={weight} placeholder="—"
            onChange={e => setWeight(e.target.value)}
            onBlur={() => commit(reps, weight)}
            style={{ width: 42, background: "transparent", border: `1px solid ${D.border}`, color: D.text, borderRadius: 4, padding: "4px 3px", fontFamily: D.mono, fontSize: 13, textAlign: "center", outline: "none" }} />
        </div>
        <Mono style={{ fontSize: 10, color: D.border }}>×</Mono>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
          <Mono style={{ fontSize: 7, color: D.muted, letterSpacing: 1 }}>REPS</Mono>
          <input type="number" min={0} max={99} value={reps} placeholder="—"
            onChange={e => setReps(e.target.value)}
            onBlur={() => commit(reps, weight)}
            style={{ width: 42, background: "transparent", border: `1px solid ${done ? color + "88" : D.border}`, color: done ? color : D.text, borderRadius: 4, padding: "4px 3px", fontFamily: D.mono, fontSize: 13, textAlign: "center", outline: "none" }} />
        </div>
      </div>
      {!done && lastSaved?.reps != null && (
        <Mono style={{ fontSize: 7, color: D.muted, display: "block", marginTop: 5, textAlign: "center" }}>
          last: {lastSaved.weight != null ? `${lastSaved.weight}kg × ` : ""}{lastSaved.reps}
        </Mono>
      )}
      {!done && lastSaved == null && (
        <Mono style={{ fontSize: 7, color: D.muted, display: "block", marginTop: 5, textAlign: "center" }}>target: {target}</Mono>
      )}
      {done && weight !== "" && (
        <Mono style={{ fontSize: 7, color, display: "block", marginTop: 5, textAlign: "center" }}>{weight}kg × {reps}</Mono>
      )}
    </div>
  );
}

// ─── MOBILITY STRETCH CARD ────────────────────────────────────────────────────
function StretchCard({ stretch, color, idx, onSetDone, totalDone, totalSets }) {
  const timer = useHoldTimer();
  const [activeSide, setActiveSide] = useState("left");
  const [localDone, setLocalDone] = useState(0);
  const [showDetail, setShowDetail] = useState(false);
  const myTotal = stretch.sets * (stretch.side ? 2 : 1);
  const allDone = localDone >= myTotal;

  const handleNext = () => {
    if (localDone < myTotal) {
      const next = localDone + 1;
      setLocalDone(next);
      onSetDone();
      if (stretch.side && activeSide === "left" && next < myTotal) setActiveSide("right");
      else setActiveSide("left");
      timer.reset(stretch.hold);
    }
  };

  return (
    <Card style={{ marginBottom: 14 }} color={allDone ? color : undefined}>
      <div style={{ padding: "13px 15px", borderBottom: `1px solid ${D.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 8, alignItems: "flex-start" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 5 }}>
              <Mono style={{ fontSize: 9, color: allDone ? color : D.muted, textTransform: "uppercase", letterSpacing: 2 }}>
                {allDone ? "✓ done" : `#${idx + 1}`}
              </Mono>
              <span style={{ color: D.faint, fontSize: 9 }}>·</span>
              <Mono style={{ fontSize: 9, color: D.muted }}>{stretch.target}</Mono>
            </div>
            <div style={{ fontWeight: 700, fontSize: 15, lineHeight: 1.2 }}>{stretch.name}</div>
          </div>
          <div style={{ textAlign: "right", flexShrink: 0 }}>
            <Mono style={{ fontSize: 14, fontWeight: 700, color }}>{stretch.hold}s</Mono>
            <div style={{ fontSize: 9, color: D.muted, fontFamily: D.mono, marginTop: 2 }}>
              {stretch.sets}set{stretch.sets > 1 ? "s" : ""}{stretch.side ? " · each" : ""}
            </div>
          </div>
        </div>
        <div style={{ fontSize: 12, color: D.muted, fontStyle: "italic", lineHeight: 1.5, marginTop: 4 }}>{stretch.notes}</div>
        {stretch.cues && (
          <button onClick={() => setShowDetail(true)} style={{ marginTop: 8, background: "transparent", border: `1px solid ${color}55`, borderRadius: 4, padding: "2px 10px", cursor: "pointer", fontFamily: D.mono, fontSize: 9, color, letterSpacing: 1 }}>
            How to →
          </button>
        )}
      </div>

      {showDetail && <ExerciseDetailModal item={stretch} color={color} onClose={() => setShowDetail(false)} />}

      {!allDone && (
        <div style={{ padding: "18px 15px", background: D.bg }}>
          {stretch.side && (
            <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 16 }}>
              {["left", "right"].map(s => (
                <button key={s} onClick={() => setActiveSide(s)} style={{
                  background: activeSide === s ? color : "transparent",
                  color: activeSide === s ? "#fff" : D.muted,
                  border: `1px solid ${activeSide === s ? color : D.border}`,
                  borderRadius: 6, padding: "5px 14px", cursor: "pointer",
                  fontFamily: D.mono, fontSize: 10, textTransform: "capitalize", letterSpacing: 1,
                }}>{s}</button>
              ))}
            </div>
          )}
          <RingTimer timer={timer} hold={stretch.hold} color={color} />
          {timer.done && (
            <div style={{ textAlign: "center", marginTop: 14 }}>
              <div style={{ fontSize: 10, color: D.muted, fontFamily: D.mono, marginBottom: 8 }}>
                Set {localDone + 1}/{myTotal}{stretch.side ? ` — ${activeSide}` : ""}
              </div>
              <button onClick={handleNext} style={pill(color, "#fff")}>
                {localDone + 1 < myTotal ? "Next Set →" : "Complete ✓"}
              </button>
            </div>
          )}
        </div>
      )}

      {allDone && (
        <div style={{ padding: "11px 15px", background: color + "12", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 16 }}>✓</span>
          <Mono style={{ fontSize: 12, color, fontWeight: 700 }}>{myTotal} set{myTotal > 1 ? "s" : ""} completed</Mono>
        </div>
      )}
    </Card>
  );
}

// ─── MOBILITY SESSION VIEW ────────────────────────────────────────────────────
function MobilitySession({ session, onBack, onComplete }) {
  const [setsLogged, setSetsLogged] = useState(0);
  const [finished, setFinished] = useState(false);
  const totalSets = session.stretches.reduce((a, s) => a + s.sets * (s.side ? 2 : 1), 0);
  const pct = Math.min((setsLogged / totalSets) * 100, 100);

  const handleFinish = async () => {
    const prev = await loadKey(SK.mobilityHist) || [];
    const entry = {
      type: "mobility", date: new Date().toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "2-digit" }),
      label: session.label, sub: session.tag.split("·")[1]?.trim() || "", color: session.color,
    };
    await saveKey(SK.mobilityHist, [entry, ...prev].slice(0, 50));
    setFinished(true);
    onComplete();
  };

  if (finished) return (
    <div style={{ textAlign: "center", padding: "60px 20px" }}>
      <div style={{ fontSize: 56, marginBottom: 16 }}>🥋</div>
      <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Session Complete!</div>
      <div style={{ color: D.muted, marginBottom: 28 }}>{session.label}</div>
      <button onClick={onBack} style={pill(session.color, "#fff")}>← Back to Mobility</button>
    </div>
  );

  return (
    <div>
      <div style={{ marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 7 }}>
          <Label>Progress</Label>
          <Mono style={{ fontSize: 11, color: session.color }}>{Math.round(pct)}%</Mono>
        </div>
        <div style={{ height: 4, background: D.border, borderRadius: 2 }}>
          <div style={{ height: "100%", width: `${pct}%`, background: session.color, borderRadius: 2, transition: "width 0.5s" }} />
        </div>
      </div>

      <div style={{ background: D.surface2, borderLeft: `3px solid ${session.color}`, borderRadius: 8, padding: "12px 14px", marginBottom: 18 }}>
        <Label style={{ color: session.color, marginBottom: 5 }}>Why this session</Label>
        <div style={{ fontSize: 12, color: D.muted, lineHeight: 1.6 }}>{session.purpose}</div>
      </div>

      {session.stretches.map((s, i) => (
        <StretchCard key={i} stretch={s} color={session.color} idx={i}
          onSetDone={() => setSetsLogged(p => p + 1)}
          totalDone={setsLogged} totalSets={totalSets} />
      ))}

      {pct >= 100 && (
        <button onClick={handleFinish} style={{ width: "100%", background: session.color, color: "#fff", border: "none", borderRadius: 10, padding: "15px", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: D.font, marginTop: 4, marginBottom: 80 }}>
          ✓ Complete Session
        </button>
      )}
    </div>
  );
}

// ─── HISTORY TAB ──────────────────────────────────────────────────────────────
function HistoryTab({ sHistory, mHistory }) {
  const all = [...(sHistory || []), ...(mHistory || [])]
    .sort((a, b) => 0)
    .slice(0, 40);

  const totalStrength = (sHistory || []).length;
  const totalMobility = (mHistory || []).length;
  const streak = Math.min(totalStrength + totalMobility, 99);

  if (all.length === 0) return (
    <div style={{ textAlign: "center", padding: "60px 20px" }}>
      <div style={{ fontSize: 52, marginBottom: 16 }}>📊</div>
      <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>No sessions yet</div>
      <div style={{ fontSize: 13, color: D.muted }}>Complete your first workout or stretch session to see your history here.</div>

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 22 }}>
        {[["Total", all.length, D.text], ["Strength", totalStrength, D.amber], ["Mobility", totalMobility, D.tkdRed]].map(([l,v,c]) => (
          <Card key={l}>
            <div style={{ padding: "14px 12px", textAlign: "center" }}>
              <div style={{ fontSize: 26, fontWeight: 700, fontFamily: D.mono, color: c }}>{v}</div>

            <div style={{ width: 3, height: 36, background: h.color, borderRadius: 2, flexShrink: 0 }} />

              <div style={{ fontWeight: 700, fontSize: 13 }}>{h.label}</div>
              <Mono style={{ fontSize: 10, color: D.muted, display: "block", marginTop: 2 }}>Mobility · {h.date}</Mono>

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("home");
  const [view, setView] = useState("list"); // list | workout | session
  const [workoutPhase, setWorkoutPhase] = useState(0);
  const [workoutDay, setWorkoutDay] = useState(0);
  const [activeSession, setActiveSession] = useState(null);
  const [sHistory, setSHistory] = useState([]);
  const [mHistory, setMHistory] = useState([]);
  const [refreshKey, setRefreshKey] = useState(0);

  useEffect(() => {
    loadKey(SK.strengthHist).then(d => setSHistory(d || []));
    loadKey(SK.mobilityHist).then(d => setMHistory(d || []));
  }, [refreshKey]);

  const startWorkout = (phaseIdx, dayIdx) => {
    setWorkoutPhase(phaseIdx); setWorkoutDay(dayIdx);
    setView("workout"); setTab("strength");
  };
  const startSession = (session) => {
    setActiveSession(session);
    setView("session"); setTab("mobility");
  };
  const handleComplete = () => setRefreshKey(k => k + 1);

  const navItems = [
    { id: "home", icon: "⌂", label: "Home" },
    { id: "strength", icon: "💪", label: "Strength" },
    { id: "mobility", icon: "🥋", label: "Mobility" },
    { id: "history", icon: "📊", label: "History" },
  ];

  const inWorkout = tab === "strength" && view === "workout";
  const inSession = tab === "mobility" && view === "session";

  const getHeaderTitle = () => {
    if (inWorkout) return `${strengthPlan.phases[workoutPhase].days[workoutDay].day} — ${strengthPlan.phases[workoutPhase].days[workoutDay].type}`;
    if (inSession) return activeSession?.label;
    if (tab === "home") return "Training Hub";
    if (tab === "strength") return "Strength";
    if (tab === "mobility") return "Mobility";
    if (tab === "history") return "History";
  };

  const getHeaderSub = () => {
    if (inWorkout) return `${strengthPlan.phases[workoutPhase].label} · ${strengthPlan.phases[workoutPhase].weeks}`;
    if (inSession) return activeSession?.tag;
    return null;
  };

  const getHeaderColor = () => {
    if (inWorkout) return strengthPlan.phases[workoutPhase].color;
    if (inSession) return activeSession?.color;
    return D.text;
  };

  const handleBack = () => setView("list");

  return (
    <div style={{ minHeight: "100vh", background: D.bg, color: D.text, fontFamily: D.font, paddingBottom: 70, maxWidth: 480, margin: "0 auto" }}>

      {/* Header */}
      <div style={{ background: D.surface, borderBottom: `1px solid ${D.border}`, padding: "14px 16px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {(inWorkout || inSession) && (
            <button onClick={handleBack} style={{ background: "none", border: "none", color: D.muted, cursor: "pointer", fontSize: 22, padding: 0, lineHeight: 1, flexShrink: 0 }}>←</button>
          )}
          <div>
            <div style={{ fontWeight: 700, fontSize: 18, lineHeight: 1.1 }}>{getHeaderTitle()}</div>
            {getHeaderSub() && (
              <Mono style={{ fontSize: 9, color: getHeaderColor(), letterSpacing: 2, textTransform: "uppercase", display: "block", marginTop: 2 }}>{getHeaderSub()}</Mono>
            )}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ padding: "16px 14px" }}>
        {tab === "home" && view === "list" && (
          <HomeTab sHistory={sHistory} mHistory={mHistory}
            onGoStrength={() => { setTab("strength"); setView("list"); }}
            onGoMobility={() => { setTab("mobility"); setView("list"); }} />
        )}
        {tab === "strength" && view === "list" && <StrengthTab onStartWorkout={startWorkout} />}
        {tab === "strength" && view === "workout" && (
          <StrengthWorkout phaseIdx={workoutPhase} dayIdx={workoutDay}
            onBack={handleBack} onComplete={handleComplete} />
        )}
        {tab === "mobility" && view === "list" && <MobilityTab onStartSession={startSession} />}
        {tab === "mobility" && view === "session" && activeSession && (
          <MobilitySession session={activeSession} onBack={handleBack} onComplete={handleComplete} />
        )}
        {tab === "history" && <HistoryTab sHistory={sHistory} mHistory={mHistory} />}
      </div>

      {/* Bottom Nav */}
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 480,
        background: D.surface, borderTop: `1px solid ${D.border}`,
        display: "grid", gridTemplateColumns: "repeat(4,1fr)", zIndex: 100,
      }}>
        {navItems.map(n => {
          const active = tab === n.id;
          const accentColor = n.id === "strength" ? D.amber : n.id === "mobility" ? D.tkdRed : n.id === "history" ? D.blue : D.text;
          return (
            <button key={n.id} onClick={() => { setTab(n.id); setView("list"); }} style={{
              background: "none", border: "none", padding: "10px 4px 12px",
              cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            }}>
              <span style={{ fontSize: 20, filter: active ? "none" : "grayscale(40%) opacity(0.45)" }}>{n.icon}</span>
              <Mono style={{ fontSize: 8, color: active ? accentColor : D.muted, letterSpacing: 1, textTransform: "uppercase" }}>{n.label}</Mono>
              {active && <div style={{ width: 16, height: 2, background: accentColor, borderRadius: 1 }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
  </script>
